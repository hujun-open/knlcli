name: Release export-disk helper image

on:
  push:
    tags:
      - 'defaultHelperImg_v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push knlcli-export image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository_owner }}/knlcli-export
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        run: echo "TAG=${GITHUB_REF#refs/tags/defaultHelperImg_}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/export-disk/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
